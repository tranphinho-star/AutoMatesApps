<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Dang nhap vao Giao trinh Power Apps & Power Automate">
    <title>Dang nhap - Power Platform Giao trinh</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --purple-primary: #742774;
            --purple-light: #9B4F96;
            --purple-dark: #5C1F5C;
            --blue-primary: #0078D4;
            --blue-light: #3AA0F7;
            --bg-primary: #0F0F1A;
            --bg-secondary: #161625;
            --bg-tertiary: #1E1E32;
            --bg-card: rgba(30, 30, 50, 0.7);
            --text-primary: #F0F0F5;
            --text-secondary: #A0A0B8;
            --text-muted: #6B6B80;
            --text-accent: #B388FF;
            --border-color: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.15);
            --gradient-purple: linear-gradient(135deg, #742774, #9B4F96);
            --gradient-mixed: linear-gradient(135deg, #742774, #0078D4);
            --gradient-hero: linear-gradient(135deg, #0F0F1A 0%, #1a1a3e 50%, #2d1b4e 100%);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
            --shadow-glow-purple: 0 0 20px rgba(116, 39, 116, 0.3);
            --radius-md: 10px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --transition-fast: 0.15s ease;
            --transition-normal: 0.3s ease;
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.7;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        ::selection { background: rgba(116, 39, 116, 0.4); color: #fff; }

        .bg-animation {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; overflow: hidden;
        }
        .bg-animation::before {
            content: '';
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background:
                radial-gradient(circle at 20% 30%, rgba(116, 39, 116, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 120, 212, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(179, 136, 255, 0.05) 0%, transparent 40%);
            animation: bgFloat 20s ease-in-out infinite alternate;
        }
        .bg-animation::after {
            content: '';
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background:
                radial-gradient(circle at 70% 20%, rgba(155, 79, 150, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 30% 80%, rgba(58, 160, 247, 0.08) 0%, transparent 40%);
            animation: bgFloat2 25s ease-in-out infinite alternate;
        }
        @keyframes bgFloat {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-3%, 3%) rotate(3deg); }
            100% { transform: translate(3%, -3%) rotate(-3deg); }
        }
        @keyframes bgFloat2 {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            100% { transform: translate(5%, -5%) rotate(5deg) scale(1.05); }
        }

        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .particle {
            position: absolute; width: 4px; height: 4px; border-radius: 50%; opacity: 0;
            animation: particleFloat linear infinite;
        }
        .particle:nth-child(1) { left: 10%; animation-duration: 15s; animation-delay: 0s; background: rgba(116, 39, 116, 0.5); }
        .particle:nth-child(2) { left: 25%; animation-duration: 20s; animation-delay: 3s; background: rgba(0, 120, 212, 0.5); }
        .particle:nth-child(3) { left: 40%; animation-duration: 18s; animation-delay: 1s; background: rgba(179, 136, 255, 0.4); }
        .particle:nth-child(4) { left: 55%; animation-duration: 22s; animation-delay: 5s; background: rgba(116, 39, 116, 0.4); }
        .particle:nth-child(5) { left: 70%; animation-duration: 16s; animation-delay: 2s; background: rgba(58, 160, 247, 0.5); }
        .particle:nth-child(6) { left: 85%; animation-duration: 19s; animation-delay: 4s; background: rgba(155, 79, 150, 0.4); }
        @keyframes particleFloat {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
        }

        .login-container { position: relative; z-index: 1; width: 100%; max-width: 440px; padding: 20px; }

        .login-card {
            background: rgba(22, 22, 37, 0.85);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            padding: 48px 40px;
            box-shadow: var(--shadow-lg), 0 0 80px rgba(116, 39, 116, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: all var(--transition-normal);
            animation: cardAppear 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }
        @keyframes cardAppear {
            0% { opacity: 0; transform: translateY(30px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .login-card:hover {
            border-color: var(--border-hover);
            box-shadow: var(--shadow-lg), 0 0 100px rgba(116, 39, 116, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .login-header { text-align: center; margin-bottom: 36px; }
        .login-logo {
            width: 72px; height: 72px;
            background: var(--gradient-mixed);
            border-radius: var(--radius-lg);
            display: flex; align-items: center; justify-content: center;
            font-size: 36px;
            margin: 0 auto 20px;
            box-shadow: var(--shadow-glow-purple);
            animation: logoPulse 3s ease-in-out infinite;
            position: relative;
        }
        .login-logo::after {
            content: '';
            position: absolute; inset: -3px;
            border-radius: calc(var(--radius-lg) + 3px);
            background: var(--gradient-mixed);
            z-index: -1; opacity: 0.4; filter: blur(8px);
            animation: logoGlow 3s ease-in-out infinite alternate;
        }
        @keyframes logoPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
        @keyframes logoGlow { 0% { opacity: 0.2; } 100% { opacity: 0.5; } }

        .login-title {
            font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, #B388FF 50%, #64B5F6 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            margin-bottom: 6px;
        }
        .login-subtitle { font-size: 13px; color: var(--text-muted); }

        .login-form { display: flex; flex-direction: column; gap: 20px; }
        .form-group { position: relative; }
        .form-label {
            display: block; font-size: 12px; font-weight: 600;
            color: var(--text-secondary); margin-bottom: 8px;
            letter-spacing: 0.5px; text-transform: uppercase;
        }
        .form-input-wrapper { position: relative; display: flex; align-items: center; }
        .form-input-icon {
            position: absolute; left: 16px; font-size: 18px;
            color: var(--text-muted); transition: color var(--transition-fast);
            z-index: 1; pointer-events: none;
        }
        .form-input {
            width: 100%; padding: 14px 16px 14px 48px;
            background: rgba(15, 15, 26, 0.6);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500;
            transition: all var(--transition-fast); outline: none;
        }
        .form-input::placeholder { color: var(--text-muted); font-weight: 400; }
        .form-input:focus {
            border-color: var(--purple-primary);
            background: rgba(15, 15, 26, 0.9);
            box-shadow: 0 0 0 3px rgba(116, 39, 116, 0.15);
        }
        .form-group:focus-within .form-input-icon { color: var(--text-accent); }
        .form-input-focus-line {
            position: absolute; bottom: 0; left: 0;
            width: 100%; height: 2px;
            background: var(--gradient-purple);
            border-radius: 0 0 var(--radius-md) var(--radius-md);
            transform: scaleX(0); transform-origin: center;
            transition: transform var(--transition-normal);
        }
        .form-input:focus ~ .form-input-focus-line { transform: scaleX(1); }

        .password-toggle {
            position: absolute; right: 14px;
            background: none; border: none;
            color: var(--text-muted); cursor: pointer;
            font-size: 18px; padding: 4px;
            transition: color var(--transition-fast); z-index: 1;
        }
        .password-toggle:hover { color: var(--text-accent); }

        .error-message {
            display: none; align-items: center; gap: 8px;
            padding: 12px 16px;
            background: rgba(216, 59, 1, 0.1);
            border: 1px solid rgba(216, 59, 1, 0.25);
            border-radius: 6px; font-size: 13px; color: #FF6B4A;
            animation: shakeError 0.5s ease;
        }
        .error-message.show { display: flex; }
        @keyframes shakeError {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        .login-btn {
            width: 100%; padding: 15px;
            background: var(--gradient-mixed);
            border: none; border-radius: var(--radius-md);
            color: #fff; font-family: 'Inter', sans-serif;
            font-size: 15px; font-weight: 700;
            cursor: pointer; letter-spacing: 0.3px;
            transition: all var(--transition-normal);
            position: relative; overflow: hidden; margin-top: 4px;
        }
        .login-btn::before {
            content: '';
            position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transition: left 0.6s ease;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(116, 39, 116, 0.4), 0 4px 12px rgba(0, 120, 212, 0.3);
        }
        .login-btn:hover::before { left: 100%; }
        .login-btn:active { transform: translateY(0); }
        .login-btn.loading { pointer-events: none; opacity: 0.8; }
        .login-btn.loading .btn-text { opacity: 0; }
        .login-btn.loading .btn-spinner { display: block; }
        .btn-text { transition: opacity var(--transition-fast); }
        .btn-spinner {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 22px; height: 22px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #fff; border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

        .login-footer { text-align: center; margin-top: 28px; padding-top: 20px; border-top: 1px solid var(--border-color); }
        .login-footer p { font-size: 12px; color: var(--text-muted); }
        .login-footer .brand {
            display: flex; align-items: center; justify-content: center;
            gap: 6px; margin-top: 8px; font-size: 11px; color: var(--text-muted);
        }
        .login-footer .brand span {
            background: var(--gradient-mixed);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            font-weight: 700;
        }

        .login-card.success { border-color: rgba(16, 124, 16, 0.3); box-shadow: 0 0 60px rgba(16, 124, 16, 0.15); }
        .success-overlay {
            display: none; position: absolute; inset: 0;
            background: rgba(22, 22, 37, 0.95); backdrop-filter: blur(10px);
            border-radius: var(--radius-xl); z-index: 10;
            align-items: center; justify-content: center;
            flex-direction: column; gap: 16px;
            animation: fadeIn 0.3s ease;
        }
        .success-overlay.show { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .success-check {
            width: 64px; height: 64px; border-radius: 50%;
            background: rgba(16, 124, 16, 0.15);
            border: 2px solid #4CAF50;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px;
            animation: successPop 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes successPop { 0% { transform: scale(0); } 70% { transform: scale(1.15); } 100% { transform: scale(1); } }
        .success-text { font-size: 18px; font-weight: 700; color: #4CAF50; }
        .success-sub { font-size: 13px; color: var(--text-secondary); }

        @media (max-width: 480px) {
            .login-card { padding: 36px 24px; }
            .login-title { font-size: 1.3rem; }
            .login-logo { width: 60px; height: 60px; font-size: 28px; }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="particles">
        <div class="particle"></div><div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    </div>
    <div class="login-container">
        <div class="login-card" id="loginCard">
            <div class="success-overlay" id="successOverlay">
                <div class="success-check">&#10003;</div>
                <div class="success-text">Dang nhap thanh cong!</div>
                <div class="success-sub">Dang chuyen huong...</div>
            </div>
            <div class="login-header">
                <div class="login-logo">&#9889;</div>
                <h1 class="login-title">Power Platform</h1>
                <p class="login-subtitle">Dang nhap de truy cap giao trinh</p>
            </div>
            <form class="login-form" id="loginForm" onsubmit="return handleLogin(event)">
                <div class="error-message" id="errorMsg">
                    <span>&#9888;</span>
                    <span>Ten dang nhap hoac mat khau khong dung!</span>
                </div>
                <div class="form-group">
                    <label class="form-label" for="username">Ten dang nhap</label>
                    <div class="form-input-wrapper">
                        <span class="form-input-icon">&#128100;</span>
                        <input type="text" class="form-input" id="username" placeholder="Nhap ten dang nhap" autocomplete="username" required>
                        <div class="form-input-focus-line"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Mat khau</label>
                    <div class="form-input-wrapper">
                        <span class="form-input-icon">&#128274;</span>
                        <input type="password" class="form-input" id="password" placeholder="Nhap mat khau" autocomplete="current-password" required>
                        <button type="button" class="password-toggle" id="togglePassword" onclick="togglePasswordVisibility()">&#128065;</button>
                        <div class="form-input-focus-line"></div>
                    </div>
                </div>
                <button type="submit" class="login-btn" id="loginBtn">
                    <span class="btn-text">Dang nhap</span>
                    <div class="btn-spinner"></div>
                </button>
            </form>
            <div class="login-footer">
                <p>Giao trinh Power Apps &amp; Power Automate</p>
                <div class="brand"><span>&copy; 2026 Power Platform Tutorial</span></div>
            </div>
        </div>
    </div>
    <script>
        var VALID_USER = 'admin';
        var VALID_PASS = '2810';
        function handleLogin(e) {
            e.preventDefault();
            var username = document.getElementById('username').value.trim();
            var password = document.getElementById('password').value;
            var errorMsg = document.getElementById('errorMsg');
            var loginBtn = document.getElementById('loginBtn');
            var loginCard = document.getElementById('loginCard');
            var successOverlay = document.getElementById('successOverlay');
            errorMsg.classList.remove('show');
            loginBtn.classList.add('loading');
            setTimeout(function() {
                if (username === VALID_USER && password === VALID_PASS) {
                    loginBtn.classList.remove('loading');
                    loginCard.classList.add('success');
                    successOverlay.classList.add('show');
                    sessionStorage.setItem('authenticated', 'true');
                    sessionStorage.setItem('user', username);
                    setTimeout(function() { window.location.href = 'index.html'; }, 1500);
                } else {
                    loginBtn.classList.remove('loading');
                    errorMsg.classList.add('show');
                    if (!username) { document.getElementById('username').focus(); }
                    else { document.getElementById('password').focus(); document.getElementById('password').select(); }
                }
            }, 800);
            return false;
        }
        function togglePasswordVisibility() {
            var p = document.getElementById('password');
            var t = document.getElementById('togglePassword');
            if (p.type === 'password') { p.type = 'text'; t.innerHTML = '&#128584;'; }
            else { p.type = 'password'; t.innerHTML = '&#128065;'; }
        }
        document.getElementById('username').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') { e.preventDefault(); document.getElementById('password').focus(); }
        });
        window.addEventListener('load', function() { document.getElementById('username').focus(); });
    </script>
</body>
</html>
